    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #ffffff 0%, var(--page) 100%);
      color: var(--airef-text);
      font-family: "Century Gothic", "Aptos", sans-serif;
    }
    main {

      margin: 0 auto;
      padding: 28px 22px 36px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid #eee5e7;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(64, 64, 64, 0.08);
      padding: 18px 18px 12px;
    }
    .topline {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      color: var(--airef-text);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .kpi {
      color: var(--airef-burgundy);
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      margin: 8px 0 16px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--airef-burgundy);
    }
    .year-pill {
      min-width: 72px;
      border: 1px solid #ead5db;
      border-radius: 999px;
      padding: 6px 12px;
      text-align: center;
      font-weight: 700;
      color: var(--airef-burgundy);
      background: #fff7f9;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }
    .axis text, .legend, .note {
      fill: var(--airef-text);
      font-size: 12px;
    }
    .grid line {
      stroke: var(--airef-grid);
      stroke-width: 1;
    }
    .tooltip {
      position: fixed;
      pointer-events: none;
      transform: translate(12px, -12px);
      background: #ffffff;
      border: 1px solid #ead5db;
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--airef-text);
      box-shadow: 0 12px 30px rgba(64, 64, 64, 0.14);
      font-size: 12px;
      opacity: 0;
      transition: opacity 120ms ease;
      z-index: 10;
    }
    .source {
      margin: 10px 0 0;
      font-size: 12px;
      color: var(--airef-text);
    }
    @media (max-width: 680px) {
      main { padding: 18px 12px 28px; }
      .topline { align-items: start; flex-direction: column; }
      .kpi { font-size: 24px; }
    }
  </style>

      const node = document.createElementNS("http://www.w3.org/2000/svg", name);

    const maxValue = Math.ceil(Math.max(...allValues) / 5) * 5;
    const margin = { top: 26, right: 28, bottom: 48, left: 190 };
    const width = 920 - margin.left - margin.right;
    const height = 430 - margin.top - margin.bottom;

    const cellH = height / regions.length;
    function color(value) {
      const t = Math.max(0, Math.min(1, (value - minValue) / (maxValue - minValue)));
      const start = [243, 214, 218];
      const end = [131, 8, 42];
      const rgb = start.map((s, i) => Math.round(s + (end[i] - s) * t));
