<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peso de mujeres por tramo de edad</title>
  <style>
    :root {
      --airef-burgundy: #83082A;
      --airef-crimson: #D00D43;
      --airef-rose: #E397A0;
      --airef-text: #404040;
      --airef-grid: #CCCCCC;
      --panel: #ffffff;
      --page: #f7f5f5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #ffffff 0%, var(--page) 100%);
      color: var(--airef-text);
      font-family: "Century Gothic", "Aptos", sans-serif;
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 22px 36px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid #eee5e7;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(64, 64, 64, 0.08);
      padding: 18px 18px 12px;
    }
    .topline {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      color: var(--airef-text);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .kpi {
      color: var(--airef-burgundy);
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      margin: 8px 0 16px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--airef-burgundy);
    }
    .year-pill {
      min-width: 72px;
      border: 1px solid #ead5db;
      border-radius: 999px;
      padding: 6px 12px;
      text-align: center;
      font-weight: 700;
      color: var(--airef-burgundy);
      background: #fff7f9;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }
    .axis text, .legend, .note {
      fill: var(--airef-text);
      font-size: 12px;
    }
    .grid line {
      stroke: var(--airef-grid);
      stroke-width: 1;
    }
    .tooltip {
      position: fixed;
      pointer-events: none;
      transform: translate(12px, -12px);
      background: #ffffff;
      border: 1px solid #ead5db;
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--airef-text);
      box-shadow: 0 12px 30px rgba(64, 64, 64, 0.14);
      font-size: 12px;
      opacity: 0;
      transition: opacity 120ms ease;
      z-index: 10;
    }
    .source {
      margin: 10px 0 0;
      font-size: 12px;
      color: var(--airef-text);
    }
    @media (max-width: 680px) {
      main { padding: 18px 12px 28px; }
      .topline { align-items: start; flex-direction: column; }
      .kpi { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main>

      <div class="topline">
        <h1>Peso de mujeres por tramo de edad</h1>

      </div>
      <div class="controls">
        <input id="yearSlider" type="range">

      </div>
      <svg id="peso_mujeres_edad" viewBox="0 0 920 430" role="img" aria-label="Peso de mujeres por tramo de edad"></svg>
      <p class="source">Fuente: AIReF a partir de SEPE.</p>
    </section>
  </main>
  <div class="tooltip" id="tooltip"></div>

"share": 51.44868579225839}, {"age": "50 - 54 años", "share": 48.95320599052304}, {"age": "55 - 59 años", "share": 45.238443935239324}, {"age": "60 y más años", "share": 47.48721874924174}], "2021": [{"age": "16 - 19 años", "share": 35.581856047137705}, {"age": "20 - 24 años", "share": 49.31559259880571}, {"age": "25 - 29 años", "share": 55.00135875645571}, {"age": "30 - 34 años", "share": 58.166495574522095}, {"age": "35 - 39 años", "share": 58.043822137649656}, {"age": "40 - 44 años", "share": 56.043673962294285}, {"age": "45 - 49 años", "share": 53.42813608724411}, {"age": "50 - 54 años", "share": 51.051101342078944}, {"age": "55 - 59 años", "share": 46.576496846598694}, {"age": "60 y más años", "share": 48.63588620615528}], "2022": [{"age": "16 - 19 años", "share": 32.07908363408128}, {"age": "20 - 24 años", "share": 47.47613267970765}, {"age": "25 - 29 años", "share": 54.59233718984551}, {"age": "30 - 34 años", "share": 57.93359608630975}, {"age": "35 - 39 años", "share": 58.517547681867}, {"age": "40 - 44 años", "share": 56.60932937452458}, {"age": "45 - 49 años", "share": 53.95116805339546}, {"age": "50 - 54 años", "share": 52.46953691379845}, {"age": "55 - 59 años", "share": 48.44493480519531}, {"age": "60 y más años", "share": 49.89209699990949}], "2023": [{"age": "16 - 19 años", "share": 35.05919568301817}, {"age": "20 - 24 años", "share": 46.295139456348586}, {"age": "25 - 29 años", "share": 53.519614551557304}, {"age": "30 - 34 años", "share": 56.76348638083335}, {"age": "35 - 39 años", "share": 58.08014407924358}, {"age": "40 - 44 años", "share": 56.70645901282021}, {"age": "45 - 49 años", "share": 54.33291873325759}, {"age": "50 - 54 años", "share": 54.1169901238525}, {"age": "55 - 59 años", "share": 50.50241072282419}, {"age": "60 y más años", "share": 51.14906839662099}], "2024": [{"age": "16 - 19 años", "share": 36.00383631713555}, {"age": "20 - 24 años", "share": 46.65374785856714}, {"age": "25 - 29 años", "share": 53.36304890942218}, {"age": "30 -     const years = Object.keys(chartData).map(Number).sort((a, b) => a - b);
    const slider = document.getElementById("yearSlider");
    const yearLabel = document.getElementById("yearLabel");
    const headline = document.getElementById("headline");
    const svg = document.getElementById("peso_mujeres_edad");
    const tooltip = document.getElementById("tooltip");
    slider.min = 0;
    slider.max = years.length - 1;
    slider.value = years.length - 1;
    slider.addEventListener("input", () => draw(years[Number(slider.value)]));

    function el(name, attrs = {}, parent = svg) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attrs)) node.setAttribute(key, value);
      parent.appendChild(node);
      return node;
    }
    function clear() { while (svg.firstChild) svg.removeChild(svg.firstChild); }
    function fmt(value) { return value.toLocaleString("es-ES", { maximumFractionDigits: 1 }); }
    function showTip(event, html) {
      tooltip.innerHTML = html;
      tooltip.style.left = `${event.clientX}px`;
      tooltip.style.top = `${event.clientY}px`;
      tooltip.style.opacity = 1;
    }
    function hideTip() { tooltip.style.opacity = 0; }
    function draw(year) {
      clear();
      yearLabel.textContent = year;
      const rows = chartData[year];
      const average = rows.reduce((sum, row) => sum + row.share, 0) / rows.length;
      headline.textContent = `${fmt(average)} media`;
      const margin = { top: 20, right: 26, bottom: 86, left: 64 };
      const width = 920 - margin.left - margin.right;
      const height = 430 - margin.top - margin.bottom;
      const maxValue = 100;
      const band = width / rows.length;
      const x = index => margin.left + index * band + band * 0.18;
      const barWidth = band * 0.64;
      const y = value => margin.top + height - value / maxValue * height;

      for (let tick = 0; tick <= maxValue; tick += 20) {
        const ty = y(tick);
        el("line", { x1: margin.left, y1: ty, x2: margin.left + width, y2: ty, stroke: "#CCCCCC" });
        el("text", { x: margin.left - 10, y: ty + 4, "text-anchor": "end", fill: "#404040", "font-size": 12 }).textContent = tick;
      }
      el("line", { x1: margin.left, y1: y(50), x2: margin.left + width, y2: y(50), stroke: "#404040", "stroke-width": 2 });
      rows.forEach((row, i) => {
        const bx = x(i);
        const by = y(row.share);
        const rect = el("rect", {
          x: bx,
          y: by,
          width: barWidth,
          height: margin.top + height - by,
          fill: row.share >= 50 ? "#83082A" : "#E397A0",
          rx: 2
        });
        rect.addEventListener("mousemove", event => showTip(event, `<strong>${row.age}</strong><br>Mujeres: ${fmt(row.share)}<br>Hombres: ${fmt(100 - row.share)}`));
        rect.addEventListener("mouseleave", hideTip);
        el("text", { x: bx + barWidth / 2, y: margin.top + height + 18, "text-anchor": "end", fill: "#404040", "font-size": 11, transform: `rotate(-38 ${bx + barWidth / 2} ${margin.top + height + 18})` }).textContent = row.age;
      });
    }
    draw(years[years.length - 1]);
